# ─────────────────────────────────────────────────────────────
# Pipeline 4: Deploy to VPS
# Manual trigger only. Deploys latest main to Oracle Cloud VPS
# via SSH, restarts the ghost trader systemd service, and
# verifies the process is alive.
# ─────────────────────────────────────────────────────────────
name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ghost-trader
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run offline tests (fast fail)
        run: pytest tests/ -v -m "not live" --tb=short
        env:
          PYTHONPATH: .
          ENV: test

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          cat >> ~/.ssh/config << EOF
          Host oracle-vps
            HostName ${{ secrets.VPS_HOST }}
            User ${{ secrets.VPS_USER }}
            IdentityFile ~/.ssh/vps_key
            StrictHostKeyChecking no
          EOF

      - name: Deploy to VPS
        run: |
          ssh oracle-vps << 'DEPLOY'
            cd ~/quant
            echo "=== Fetching latest code ==="
            git fetch origin main
            git reset --hard origin/main
            echo "=== Installing dependencies ==="
            .venv/bin/pip install -r requirements.txt --quiet
            echo "=== Restarting ghost trader ==="
            sudo systemctl restart ghost-trader
            sleep 10
            echo "=== Checking service status ==="
            sudo systemctl is-active ghost-trader
          DEPLOY

      - name: Post-deploy health check
        run: |
          ssh oracle-vps << 'CHECK'
            cd ~/quant
            echo "=== Database state ==="
            sqlite3 data/ghost/trades.db "SELECT COUNT(*) || ' equity snapshots' FROM equity_snapshots;"
            sqlite3 data/ghost/trades.db "SELECT COUNT(*) || ' open positions' FROM ghost_orders WHERE status='OPEN';"
            echo "=== Quick report ==="
            PYTHONPATH=. .venv/bin/python -m scripts.ghost_report 2>&1 | head -20
          CHECK

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/vps_key
