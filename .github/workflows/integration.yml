# ─────────────────────────────────────────────────────────────
# Pipeline 2: Turbo Integration Test
# Manual trigger or nightly schedule.
# Runs turbo mode (1m candles, 5 ticks) against live exchange
# to verify the full pipeline works mechanically.
# ─────────────────────────────────────────────────────────────
name: Turbo Integration

on:
  workflow_dispatch:
  schedule:
    # Nightly at 03:00 UTC (midnight Argentina)
    - cron: '0 3 * * *'

jobs:
  integration:
    runs-on: ubuntu-latest
    environment: trader
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run offline tests
        run: pytest tests/ -v -m "not live" --tb=short
        env:
          PYTHONPATH: .
          ENV: test

      - name: Run live connectivity tests
        continue-on-error: true
        run: pytest tests/ -v -m "live" --tb=short
        env:
          PYTHONPATH: .
          EXCHANGE_READONLY_API_KEY: ${{ secrets.EXCHANGE_READONLY_API_KEY }}
          EXCHANGE_READONLY_API_SECRET: ${{ secrets.EXCHANGE_READONLY_API_SECRET }}

      - name: Create data directories
        run: mkdir -p data/ci data/reports logs

      - name: Build CI 1M universe
        run: python main.py research --pipeline configs/pipelines/ci_1m.yml --universe configs/universe/alpha_v1.yml --backtest configs/backtest/stress_test.yml --strategy configs/strategy/alpha_v1.yml
        env:
          PYTHONPATH: .
          EXCHANGE_READONLY_API_KEY: ${{ secrets.EXCHANGE_READONLY_API_KEY }}
          EXCHANGE_READONLY_API_SECRET: ${{ secrets.EXCHANGE_READONLY_API_SECRET }}

      - name: Run CI 1M integration (5 ticks)
        run: python main.py execute --pipeline configs/pipelines/ci_1m.yml --strategy configs/strategy/alpha_v1.yml --risk configs/risk/alpha_v1.yml
        env:
          PYTHONPATH: .
          EXCHANGE_READONLY_API_KEY: ${{ secrets.EXCHANGE_READONLY_API_KEY }}
          EXCHANGE_READONLY_API_SECRET: ${{ secrets.EXCHANGE_READONLY_API_SECRET }}

      - name: Generate CI report (JSON)
        run: python -m src.engine.trader.report_generator --db-path data/ci/trades_1m.db --min-sharpe 1.0 --surviving-pairs-path data/universes/1m/surviving_pairs.json --json > ci_report.json
        env:
          PYTHONPATH: .

      - name: Generate CI report (export)
        run: python -m src.engine.trader.report_generator --db-path data/ci/trades_1m.db --min-sharpe 1.0 --surviving-pairs-path data/universes/1m/surviving_pairs.json --export
        env:
          PYTHONPATH: .

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-results-${{ github.run_number }}
          path: |
            ci_report.json
            data/ci/trades_1m.db
            data/reports/
          retention-days: 30
