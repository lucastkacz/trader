# ─────────────────────────────────────────────────────────────
# Server Bootstrap (One-Time Execution)
# Use this action to provision a brand-new bare Linux VPS.
# It installs Python, Git, SQLite, clones the repository,
# dynamically injects GitHub Secrets into the .env file,
# and configures the systemd service.
# ─────────────────────────────────────────────────────────────
name: Bootstrap Server

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment (e.g., trader, production-trader)'
        required: true
        type: environment

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    timeout-minutes: 15

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          cat >> ~/.ssh/config << EOF
          Host target-vps
            HostName ${{ vars.VPS_HOST }}
            User ${{ vars.VPS_USER }}
            IdentityFile ~/.ssh/vps_key
            StrictHostKeyChecking no
          EOF

      - name: Provision Server
        run: |
          ssh target-vps << 'SETUP'
            echo "=== 1. System Updates & Dependencies ==="
            sudo apt-get update -y
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y python3-venv git sqlite3

            echo "=== 2. Cloning Repository ==="
            if [ ! -d "$HOME/quant" ]; then
              git clone https://github.com/lucastkacz/trader.git ~/quant
            fi
            
            cd ~/quant
            git fetch origin
            git reset --hard origin/main

            echo "=== 3. Python Virtual Environment ==="
            python3 -m venv .venv
            .venv/bin/pip install --upgrade pip
            .venv/bin/pip install -r requirements.txt

            echo "=== 4. Directory & Environment Config ==="
            mkdir -p data/prod data/reports logs
            
            # Securely inject GitHub Secrets into the server's .env file
            echo "LOG_LEVEL=info" > .env
            echo "EXCHANGE_READONLY_API_KEY=${{ secrets.EXCHANGE_READONLY_API_KEY }}" >> .env
            echo "EXCHANGE_READONLY_API_SECRET=${{ secrets.EXCHANGE_READONLY_API_SECRET }}" >> .env
            echo "EXCHANGE_LIVE_API_KEY=${{ secrets.EXCHANGE_LIVE_API_KEY }}" >> .env
            echo "EXCHANGE_LIVE_API_SECRET=${{ secrets.EXCHANGE_LIVE_API_SECRET }}" >> .env
            echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
            echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
            chmod 600 .env

            echo "=== 5. SystemD Service Config ==="
            sudo rm -f /etc/systemd/system/trader-engine.service
            echo "[Unit]" | sudo tee -a /etc/systemd/system/trader-engine.service > /dev/null
            echo "Description=Stat-Arb Trading Engine" | sudo tee -a /etc/systemd/system/trader-engine.service > /dev/null
            echo "After=network-online.target" | sudo tee -a /etc/systemd/system/trader-engine.service > /dev/null
            echo "Wants=network-online.target" | sudo tee -a /etc/systemd/system/trader-engine.service > /dev/null
            echo "" | sudo tee -a /etc/systemd/system/trader-engine.service > /dev/null
            echo "[Service]" | sudo tee -a /etc/systemd/system/trader-engine.service > /dev/null
            echo "Type=simple" | sudo tee -a /etc/systemd/system/trader-engine.service > /dev/null
            echo "User=ubuntu" | sudo tee -a /etc/systemd/system/trader-engine.service > /dev/null
            echo "WorkingDirectory=/home/ubuntu/quant" | sudo tee -a /etc/systemd/system/trader-engine.service > /dev/null
            echo "Environment=\"PYTHONPATH=/home/ubuntu/quant\"" | sudo tee -a /etc/systemd/system/trader-engine.service > /dev/null
            echo "ExecStart=/home/ubuntu/quant/.venv/bin/python main.py execute --pipeline configs/pipelines/prod.yml --strategy configs/strategy/alpha_v1.yml --risk configs/risk/alpha_v1.yml" | sudo tee -a /etc/systemd/system/trader-engine.service > /dev/null
            echo "Restart=on-failure" | sudo tee -a /etc/systemd/system/trader-engine.service > /dev/null
            echo "RestartSec=30" | sudo tee -a /etc/systemd/system/trader-engine.service > /dev/null
            echo "StandardOutput=append:/home/ubuntu/quant/logs/trader_stdout.log" | sudo tee -a /etc/systemd/system/trader-engine.service > /dev/null
            echo "StandardError=append:/home/ubuntu/quant/logs/trader_stderr.log" | sudo tee -a /etc/systemd/system/trader-engine.service > /dev/null
            echo "" | sudo tee -a /etc/systemd/system/trader-engine.service > /dev/null
            echo "[Install]" | sudo tee -a /etc/systemd/system/trader-engine.service > /dev/null
            echo "WantedBy=multi-user.target" | sudo tee -a /etc/systemd/system/trader-engine.service > /dev/null

            echo "--- Telegram Daemon ---"
            sudo rm -f /etc/systemd/system/trader-telegram.service
            echo "[Unit]" | sudo tee -a /etc/systemd/system/trader-telegram.service > /dev/null
            echo "Description=Stat-Arb Telegram Controller" | sudo tee -a /etc/systemd/system/trader-telegram.service > /dev/null
            echo "After=network-online.target" | sudo tee -a /etc/systemd/system/trader-telegram.service > /dev/null
            echo "Wants=network-online.target" | sudo tee -a /etc/systemd/system/trader-telegram.service > /dev/null
            echo "" | sudo tee -a /etc/systemd/system/trader-telegram.service > /dev/null
            echo "[Service]" | sudo tee -a /etc/systemd/system/trader-telegram.service > /dev/null
            echo "Type=simple" | sudo tee -a /etc/systemd/system/trader-telegram.service > /dev/null
            echo "User=ubuntu" | sudo tee -a /etc/systemd/system/trader-telegram.service > /dev/null
            echo "WorkingDirectory=/home/ubuntu/quant" | sudo tee -a /etc/systemd/system/trader-telegram.service > /dev/null
            echo "Environment=\"PYTHONPATH=/home/ubuntu/quant\"" | sudo tee -a /etc/systemd/system/trader-telegram.service > /dev/null
            echo "ExecStart=/home/ubuntu/quant/.venv/bin/python -m src.interfaces.telegram.daemon --config configs/telegram/prod.yml" | sudo tee -a /etc/systemd/system/trader-telegram.service > /dev/null
            echo "Restart=on-failure" | sudo tee -a /etc/systemd/system/trader-telegram.service > /dev/null
            echo "RestartSec=30" | sudo tee -a /etc/systemd/system/trader-telegram.service > /dev/null
            echo "StandardOutput=append:/home/ubuntu/quant/logs/telegram_stdout.log" | sudo tee -a /etc/systemd/system/trader-telegram.service > /dev/null
            echo "StandardError=append:/home/ubuntu/quant/logs/telegram_stderr.log" | sudo tee -a /etc/systemd/system/trader-telegram.service > /dev/null
            echo "" | sudo tee -a /etc/systemd/system/trader-telegram.service > /dev/null
            echo "[Install]" | sudo tee -a /etc/systemd/system/trader-telegram.service > /dev/null
            echo "WantedBy=multi-user.target" | sudo tee -a /etc/systemd/system/trader-telegram.service > /dev/null

            sudo systemctl daemon-reload
            sudo systemctl enable trader-engine
            sudo systemctl enable trader-telegram
            
            echo "=== BOOTSTRAP COMPLETE ==="
          SETUP

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/vps_key
