# CCXT market profile for linear USDT perpetual swaps.
# Example native CCXT symbol: BTC/USDT:USDT
ccxt_exchange:
  name: "linear_usdt_swap"
  enable_rate_limit: true
  adjust_for_time_difference: true
  recv_window: 10000
  market_contract:
    name: "linear_usdt_swap"
    default_type: "swap"
    default_sub_type: "linear"
    default_settle: "USDT"
    fetch_market_types:
      - "linear"
