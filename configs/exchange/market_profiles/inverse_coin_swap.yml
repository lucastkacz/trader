# CCXT market profile for inverse coin-margined swaps.
# Example native CCXT symbol: BTC/USD:BTC
# default_settle is null because inverse settle currency often varies by symbol.
ccxt_exchange:
  name: "inverse_coin_swap"
  enable_rate_limit: true
  adjust_for_time_difference: true
  recv_window: 10000
  market_contract:
    name: "inverse_coin_swap"
    default_type: "swap"
    default_sub_type: "inverse"
    default_settle: null
    fetch_market_types:
      - "inverse"
