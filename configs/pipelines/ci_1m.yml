pipeline:
  name: "CI 1M Integration"
  timeframe: "1m"
  historical_days: 1
  max_symbols: 100
  execution:
    exchange: "bybit"
    credential_tier: "readonly"
    db_path: "data/ci/trades_1m.db"
    min_sharpe: 1.0
    max_ticks: 5
    heartbeat_seconds: 60
    sync_to_boundary: false
    order_execution:
      mode: "state_only"
      fill_poll_attempts: 0
      fill_poll_interval_seconds: 0.0
      cancel_unfilled_after_poll: false
      client_order_prefix: "ci-1m"
