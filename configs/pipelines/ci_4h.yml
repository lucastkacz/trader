pipeline:
  name: "CI 4H Validation"
  timeframe: "4h"
  historical_days: 365
  max_symbols: 100
  execution:
    exchange: "bybit"
    credential_tier: "readonly"
    db_path: "data/ci/trades_4h.db"
    min_sharpe: 1.0
    max_ticks: 1
    heartbeat_seconds: 14400
    sync_to_boundary: true
    order_execution:
      mode: "state_only"
      fill_poll_attempts: 0
      fill_poll_interval_seconds: 0.0
      cancel_unfilled_after_poll: false
      client_order_prefix: "ci-4h"
