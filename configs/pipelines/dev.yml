pipeline:
  name: "DEV 1M Sandbox"
  timeframe: "1m"
  historical_days: 1
  max_symbols: 150
  execution:
    exchange: "bybit"
    credential_tier: "readonly"
    market_data_base_dir: "data/parquet"
    artifact_base_dir: "data/universes"
    db_path: "data/dev/trades_1m.db"
    min_sharpe: 0.5
    max_ticks: null
    heartbeat_seconds: 60
    sync_to_boundary: false
    order_execution:
      mode: "state_only"
      fill_poll_attempts: 0
      fill_poll_interval_seconds: 0.0
      cancel_unfilled_after_poll: false
      client_order_prefix: "dev"
    pair_refresh:
      mode: "manual"
      reload_policy: "on_boot"
      stale_open_position_policy: "natural_exit"
